minimum_pre_commit_version: "3.7.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: ruff
        name: ruff
        entry: uv run ruff check
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: uv run mypy --config-file pyproject.toml
        language: system
        pass_filenames: false

      - id: pylint
        name: pylint
        entry: uv run pylint
        language: system
        types: [python]
        files: ^k8s_utils/.*\.py$

      - id: prospector
        name: prospector
        entry: uv run prospector --no-autodetect
        language: system
        types: [python]
        files: ^k8s_utils/.*\.py$

      - id: pytest
        name: pytest
        entry: bash -c 'if [ -d tests ]; then uv run pytest -q; else echo "No tests directory found; skipping pytest."; fi'
        language: system
        pass_filenames: false
        always_run: true
